<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Next-Gen: Recognizing Up-and-Coming Streamers</title>
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stars"></div>
  <div class="auth-wrapper">
    <div class="auth-card" id="authCard">
      <div class="logo">
        <span class="logo-icon">⬡</span>
        <h1>Next-Gen</h1>
        <p class="tagline">Recognizing Up-and-Coming Streamers</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active" onsubmit="login(event)">
        <div class="form-group">
          <label for="loginEmail">Email or Username</label>
          <input type="text" id="loginEmail" placeholder="you@example.com or username" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary">Login</button>
        <p class="switch-text">No account? <a onclick="switchForm('signup')">Sign Up</a></p>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="auth-form" onsubmit="signup(event)">
        <div class="form-group">
          <label for="signupName">Username</label>
          <input type="text" id="signupName" placeholder="Choose a username" required />
        </div>
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6" />
        </div>
        <button type="submit" class="btn-primary">Create Account</button>
        <p class="switch-text">Have an account? <a onclick="switchForm('login')">Login</a></p>
      </form>

      <div id="authMsg" class="auth-msg"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
